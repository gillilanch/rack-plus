# Optional: only if Docker Desktop is installed. If `docker` is not found, skip this file
# and run PostgreSQL via Homebrew, Postgres.app, or a hosted DB (Neon, etc.)—then set
# DATABASE_URL in backend/.env (see backend/.env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: rackapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rackapp
    ports:
      - '5432:5432'
    volumes:
      - rackapp_pgdata:/var/lib/postgresql/data

volumes:
  rackapp_pgdata:
